query WineDetail($id: WineId!) {
  wine(id: $id) {
    id
    name
    beverageType
    color
    subtype
    alcoholContent
    vintage
    domain
    appellation
    region
    country
    classification
    purchase {
      price
      date
    }
    drinkWindow {
      from
      until
    }
    notes
    grapeVarieties
    servingTemperature
    place {
      latitude
      longitude
      name
    }
    createdAt
    updatedAt
    cellar {
      row
      col
      rowLabel
      colLabel
      createdAt
      updatedAt
    }
    consumption {
      rating
      favorite
      consumedDate
      tastingNotes
      contacts
    }
    gift {
      given {
        recipientName
        date
      }
      received {
        from
      }
    }
    recommendation {
      recommenderName
      comment
    }
    history {
      type
      date
      wineId
      wineName
      wineBeverageType
      wineColor
      position
    }
  }
}
