query WineDetail($id: BeverageId!) {
  beverage(id: $id) {
    id
    isMine
    ownerName
    name
    beverageType
    subtype
    alcoholContent
    producer
    region
    country
    notes
    purchase {
      price
      date
    }
    place {
      latitude
      longitude
      name
    }
    details {
      ... on WineDetails {
        color
        vintage
        appellation
        classification
        drinkWindow {
          from
          until
        }
        grapeVarieties
        servingTemperature
      }
    }
    createdAt
    updatedAt
    cellar {
      row
      col
      rowLabel
      colLabel
      createdAt
      updatedAt
    }
    consumption {
      rating
      favorite
      consumedDate
      tastingNotes
      contacts
    }
    gift {
      given {
        recipientName
        date
      }
      received {
        from
      }
    }
    recommendation {
      recommenderName
      comment
    }
    history {
      type
      date
      beverageId
      beverageName
      wineBeverageType
      wineColor
      position
    }
  }
}
