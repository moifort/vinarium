fragment WineListFields on Wine {
  id
  name
  beverageType
  color
  subtype
  alcoholContent
  vintage
  domain
  appellation
  region
  country
  classification
  purchase {
    price
    date
  }
  drinkWindow {
    from
    until
  }
  notes
  grapeVarieties
  place {
    latitude
    longitude
    name
  }
  createdAt
  updatedAt
  cellar {
    row
    col
    rowLabel
    colLabel
  }
  consumption {
    rating
    favorite
    consumedDate
    contacts
  }
  gift {
    given {
      recipientName
      date
    }
    received {
      from
    }
  }
  recommendation {
    recommenderName
    comment
  }
}
