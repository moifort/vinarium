fragment WineListFields on Beverage {
  id
  name
  beverageType
  subtype
  alcoholContent
  producer
  region
  country
  notes
  purchase {
    price
    date
  }
  place {
    latitude
    longitude
    name
  }
  details {
    ... on WineDetails {
      color
      vintage
      appellation
      classification
      drinkWindow {
        from
        until
      }
      grapeVarieties
    }
  }
  createdAt
  updatedAt
  cellar {
    row
    col
    rowLabel
    colLabel
  }
  consumption {
    rating
    favorite
    consumedDate
    contacts
  }
  gift {
    given {
      recipientName
      date
    }
    received {
      from
    }
  }
  recommendation {
    recommenderName
    comment
  }
}
