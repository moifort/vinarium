fragment WineListFields on Wine {
  id
  name
  beverageType
  color
  subtype
  alcoholContent
  vintage
  domain
  appellation
  region
  country
  classification
  purchasePrice
  purchaseDate
  drinkFrom
  drinkUntil
  notes
  giftedBy
  grapeVarieties
  latitude
  longitude
  placeName
  createdAt
  updatedAt
  cellar {
    row
    col
    rowLabel
    colLabel
  }
  consumption {
    rating
    favorite
    consumedDate
    contacts
  }
  gift {
    recipientName
    giftedDate
  }
  recommendation {
    recommenderName
    comment
  }
}
