query WineList(
  $mode: WineListMode
  $status: WineStatusFilter
  $color: WineColor
  $beverageType: BeverageType
  $sort: WineSort
  $order: SortOrder
  $limit: Int
  $after: WineId
) {
  wines(
    mode: $mode
    status: $status
    color: $color
    beverageType: $beverageType
    sort: $sort
    order: $order
    limit: $limit
    after: $after
  ) {
    items {
      ...WineListFields
    }
    hasMore
    totalCount
  }
}
