query WineList(
  $mode: BeverageListMode
  $status: BeverageStatusFilter
  $color: WineColor
  $beverageType: BeverageType
  $sort: BeverageSort
  $order: SortOrder
  $limit: Int
  $after: BeverageId
) {
  beverages(
    mode: $mode
    status: $status
    color: $color
    beverageType: $beverageType
    sort: $sort
    order: $order
    limit: $limit
    after: $after
  ) {
    items {
      ...WineListFields
    }
    hasMore
    totalCount
  }
}
