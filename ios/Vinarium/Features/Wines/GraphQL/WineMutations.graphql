mutation AddWine($input: AddBeverageInput!) {
  addBeverage(input: $input) {
    id
    name
    beverageType
    subtype
    details {
      ... on WineDetails {
        color
        vintage
      }
    }
    createdAt
    updatedAt
  }
}

mutation UpdateWine($id: BeverageId!, $input: UpdateBeverageInput!) {
  updateBeverage(id: $id, input: $input) {
    id
    name
    beverageType
    subtype
    details {
      ... on WineDetails {
        color
        vintage
      }
    }
    updatedAt
  }
}

mutation DeleteWine($id: BeverageId!) {
  deleteBeverage(id: $id)
}

mutation MarkFavorite($beverageId: BeverageId!, $favorite: Boolean!) {
  markFavorite(beverageId: $beverageId, favorite: $favorite)
}

mutation RecordTasting($beverageId: BeverageId!, $input: TastingInput!) {
  recordTasting(beverageId: $beverageId, input: $input)
}

mutation AddRecommendation($beverageId: BeverageId!, $input: RecommendationInput!) {
  addRecommendation(beverageId: $beverageId, input: $input)
}
