query AdminMetrics {
  adminMetrics {
    aiCostEur
    infraEur
    totalCostEur
    totalUsers
    premiumTotal
    premiumMonthly
    premiumYearly
    revenueProceedsEur
    revenueGrossEur
    scans
    cacheHits
    vision {
      promptTokens
      outputTokens
      thinkingTokens
    }
    enrichment {
      promptTokens
      outputTokens
      thinkingTokens
    }
    refreshedAt
  }
}
