query Changelog {
  changelog {
    version
    date
    notes
  }
}

query CellarInfo {
  cellarInfo {
    rows
    cols
    zones
    capacity
    placedCount
  }
}

mutation ReconfigureCellar($rows: Int!, $cols: Int!, $zones: Int!) {
  reconfigureCellar(rows: $rows, cols: $cols, zones: $zones) {
    __typename
    ... on CellarInfo {
      rows
      cols
      zones
      capacity
      placedCount
    }
    ... on CellarReconfigureBlocked {
      outOfBoundsCount
    }
  }
}

query ExportData {
  exportData
}

mutation ImportData($payload: String!) {
  importData(payload: $payload) {
    wines
    cellar
    tasting
    recommendation
    gift
    journal
  }
}
