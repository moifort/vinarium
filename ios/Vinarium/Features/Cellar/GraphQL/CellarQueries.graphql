query CellarBottles($limit: Int, $after: BeverageId) {
  cellarBottles(limit: $limit, after: $after) {
    items {
      beverageId
      row
      col
      rowLabel
      colLabel
      createdAt
      owner {
        displayName
        isMine
      }
      wine {
        id
        name
        beverageType
        subtype
        producer
        region
        country
        purchase {
          price
        }
        details {
          ... on WineDetails {
            color
            vintage
            appellation
            classification
            drinkWindow {
              from
              until
            }
          }
        }
      }
    }
    hasMore
  }
}

query CellarHistory($limit: Int, $offset: Int) {
  journalEvents(limit: $limit, offset: $offset) {
    items {
      type
      date
      beverageId
      beverageName
      wineBeverageType
      wineColor
      position
      actor {
        displayName
        isMine
      }
    }
    hasMore
  }
}

query SuggestCellarPosition {
  suggestCellarPosition {
    row
    col
    rowLabel
    colLabel
  }
}

query CellarGridInfo {
  cellarInfo {
    rows
    cols
  }
}
