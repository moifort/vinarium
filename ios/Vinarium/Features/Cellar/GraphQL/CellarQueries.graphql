query CellarBottles {
  cellarBottles {
    wineId
    row
    col
    rowLabel
    colLabel
    createdAt
    wine {
      id
      name
      beverageType
      color
      style
      vintage
      domain
      appellation
      region
      country
      classification
      purchasePrice
      drinkFrom
      drinkUntil
    }
  }
}

query CellarHistory {
  journalEvents {
    type
    date
    wineId
    wineName
    wineBeverageType
    wineColor
    position
  }
}

query SuggestCellarPosition {
  suggestCellarPosition {
    row
    col
    rowLabel
    colLabel
  }
}
