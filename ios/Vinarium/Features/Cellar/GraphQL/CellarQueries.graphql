query CellarBottles {
  cellarBottles {
    wineId
    row
    col
    rowLabel
    colLabel
    createdAt
    wine {
      id
      name
      beverageType
      color
      style
      vintage
      domain
      appellation
      region
      country
      classification
      purchasePrice
      drinkFrom
      drinkUntil
    }
  }
}

query CellarHistory($limit: Int, $offset: Int) {
  journalEvents(limit: $limit, offset: $offset) {
    items {
      type
      date
      wineId
      wineName
      wineBeverageType
      wineColor
      position
    }
    hasMore
  }
}

query SuggestCellarPosition {
  suggestCellarPosition {
    row
    col
    rowLabel
    colLabel
  }
}
