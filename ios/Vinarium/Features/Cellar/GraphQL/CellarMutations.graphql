mutation PlaceBottle($beverageId: BeverageId!, $row: Int!, $col: Int!) {
  placeBottle(beverageId: $beverageId, row: $row, col: $col) {
    beverageId
    row
    col
    rowLabel
    colLabel
  }
}

mutation MoveBottle($beverageId: BeverageId!, $row: Int!, $col: Int!) {
  moveBottle(beverageId: $beverageId, row: $row, col: $col) {
    beverageId
    row
    col
    rowLabel
    colLabel
  }
}

mutation ConsumeBottle($beverageId: BeverageId!, $input: ConsumptionInput!) {
  consumeBottle(beverageId: $beverageId, input: $input)
}

mutation GiftBottle($beverageId: BeverageId!, $input: GiftInput!) {
  giftBottle(beverageId: $beverageId, input: $input)
}

mutation RemoveBottle($beverageId: BeverageId!) {
  removeBottle(beverageId: $beverageId)
}
