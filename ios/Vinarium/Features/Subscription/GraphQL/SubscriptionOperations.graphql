query Entitlement {
  entitlement {
    plan
    appAccountToken
    productId
    expiresOn
  }
}

query Quota {
  quota {
    plan
    used
    limit
    remaining
    renewsOn
  }
}

mutation SyncEntitlement($signedTransaction: String!) {
  syncEntitlement(signedTransaction: $signedTransaction) {
    plan
    appAccountToken
    productId
    expiresOn
  }
}
