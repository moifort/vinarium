name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *' # 22h CET / 21h UTC

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: renovatebot/github-action@v46.1.11
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
