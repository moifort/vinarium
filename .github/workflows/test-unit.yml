name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx nitro prepare
      - run: bun tsc --noEmit
      - run: bunx biome check
      - run: bun test

  # Guard: the Cloud Function build on GCP runs `npm install` (strict peer deps)
  # on the package.json that Nitro generates in .output/server. bun is lenient
  # about peer deps, so incompatible bumps (e.g. graphql 17 vs @apollo/server 5,
  # firebase-admin 14 vs firebase-functions) pass locally but only fail at
  # `terraform apply`. This reproduces that resolution here so it fails fast.
  deploy-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Validate generated function deps under npm (strict peer deps)
        working-directory: .output/server
        # --dry-run builds the full dependency tree (so ERESOLVE peer-dep
        # conflicts still surface) without the reify/write step, which avoids
        # an unrelated npm arborist crash ("fsTop") on the runner.
        run: npm install --dry-run --ignore-scripts
