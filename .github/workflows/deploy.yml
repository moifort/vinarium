name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  deploy:
    name: 🚀 Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.10.0

      - name: Authenticate to Google Cloud (workload identity)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      # No changelog date-stamping: entries are versioned by hand at each iOS release
      # with a "## <version> (YYYY.MM.DD)" heading in CHANGELOG.md / CHANGELOG.fr.md.

      - name: Build the Nitro bundle (firebase preset)
        run: |
          bun install --frozen-lockfile
          bun run generate:assets
          bunx nitro prepare
          bun run generate:graphql
          bun run build

      - name: Materialize terraform.tfvars from GitHub secrets
        run: |
          set -euo pipefail
          mkdir -p infra
          # Apple .p8 — multiline, must be quoted properly
          printf '%s' "${{ secrets.APPLE_PRIVATE_KEY_P8 }}" > infra/apple.p8
          chmod 600 infra/apple.p8

          # App Store Connect API .p8 (same key the iOS release workflow uses),
          # for the admin metrics' sales reports. An empty file simply leaves
          # the revenue figure unavailable.
          printf '%s' "${{ secrets.ASC_KEY_P8 }}" > infra/asc.p8
          chmod 600 infra/asc.p8

          cat > infra/terraform.tfvars <<EOF
          project_id             = "${{ vars.GCP_PROJECT_ID }}"
          billing_account_id     = "${{ secrets.GCP_BILLING_ACCOUNT }}"
          org_id                 = "${{ vars.GCP_ORG_ID }}"
          region                 = "europe-west3"
          firestore_location     = "eur3"
          ios_bundle_id          = "${{ vars.IOS_BUNDLE_ID }}"
          apple_team_id          = "${{ secrets.APPLE_TEAM_ID }}"
          apple_services_id      = "${{ secrets.APPLE_SERVICES_ID }}"
          apple_key_id           = "${{ secrets.APPLE_KEY_ID }}"
          apple_private_key_path = "./apple.p8"
          google_api_key         = "${{ secrets.GEMINI_API_KEY }}"
          sentry_dsn             = "${{ secrets.SENTRY_DSN }}"
          admin_token            = "${{ secrets.ADMIN_TOKEN }}"
          apple_app_id           = "${{ vars.APPLE_APP_ID }}"
          premium_user_ids       = "${{ vars.PREMIUM_USER_IDS }}"
          asc_issuer_id          = "${{ secrets.ASC_ISSUER_ID }}"
          asc_key_id             = "${{ secrets.ASC_KEY_ID }}"
          asc_private_key_path   = "./asc.p8"
          asc_vendor_number      = "${{ vars.ASC_VENDOR_NUMBER }}"
          gcp_billing_table      = "${{ vars.GCP_BILLING_TABLE }}"
          EOF

      - name: Terraform init + apply
        working-directory: infra
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

      # Ships public/ (the invitation universal-link AASA + the /rejoindre landing
      # page). Uses the WIF-provided ADC above (the deploy SA is project owner, so
      # no extra Hosting role is needed). Non-fatal: until the Hosting site and the
      # vinarium.app custom domain exist (one-off console setup), this fails softly
      # instead of breaking the backend deploy and migrations below.
      - name: Deploy Firebase Hosting
        continue-on-error: true
        run: bunx firebase-tools deploy --only hosting --project "${{ vars.GCP_PROJECT_ID }}" --non-interactive

      - name: Run Firestore migrations
        working-directory: infra
        run: |
          URL=$(terraform output -raw function_url)
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}" \
            "${URL}/admin/migrate"
