name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (Nitro firebase preset)
        run: bun run build
        env:
          NITRO_PRESET: firebase

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy Firestore rules / indexes / functions
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only firestore:rules,firestore:indexes,functions
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Run Firestore migrations
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}" \
            "https://${{ vars.SERVER_HOST }}/admin/migrate"
