name: Release iOS

on:
  push:
    tags: ['ios-v*']
  workflow_dispatch:
    inputs:
      marketing_version:
        description: 'Marketing version (CFBundleShortVersionString), e.g. 1.1'
        required: false
        default: '1.0'

permissions:
  contents: read

concurrency:
  group: release-ios
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 40
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # git rev-list --count HEAD must see the full history

      - name: Select the latest final Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Materialize gitignored build files
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST }}" \
            | openssl base64 -d -A > ios/Vinarium/GoogleService-Info.plist
          cp ios/Vinarium/Shared/Secrets.swift.example ios/Vinarium/Shared/Secrets.swift

      - name: Install the App Store Connect API key
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "${{ secrets.ASC_KEY_P8 }}" \
            > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Import the distribution signing certificate
        env:
          IOS_DIST_CERT_P12: ${{ secrets.IOS_DIST_CERT_P12 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          # A dedicated (non-managed) Apple Distribution cert + private key, so signing
          # never depends on Xcode cloud-managed certificates (unusable from a fresh CI
          # machine). The .p12 is base64-encoded in the secret; import it into a throwaway
          # keychain that codesign/xcodebuild search during archive and export.
          KEYCHAIN="$RUNNER_TEMP/vinarium-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/dist-cert.p12"
          printf '%s' "$IOS_DIST_CERT_P12" | base64 -d > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$IOS_DIST_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # Prepend our keychain to the user search list so xcodebuild finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed 's/["[:space:]]//g')
          rm -f "$CERT_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Compute version numbers
        run: |
          set -euo pipefail
          BUILD=$(git rev-list --count HEAD)
          if [ "$GITHUB_REF_TYPE" = "tag" ] && [ "${GITHUB_REF_NAME#ios-v}" != "$GITHUB_REF_NAME" ]; then
            MARKETING="${GITHUB_REF_NAME#ios-v}"
          else
            MARKETING="${{ github.event.inputs.marketing_version }}"
          fi
          echo "BUILD=$BUILD" >> "$GITHUB_ENV"
          echo "MARKETING=$MARKETING" >> "$GITHUB_ENV"
          echo "Releasing Vinarium $MARKETING ($BUILD)"

      - name: Generate Apollo GraphQL code (gitignored, regenerated per build)
        run: |
          set -euo pipefail
          # Resolve SPM so the apollo-ios checkout (and its bundled CLI) exists.
          xcodebuild -resolvePackageDependencies \
            -project ios/Vinarium.xcodeproj -scheme Vinarium
          # Apollo 2.x ships the CLI as a tarball inside the checkout — extract it.
          CLI_DIR=$(find "$HOME/Library/Developer/Xcode/DerivedData" -type d \
            -path "*/SourcePackages/checkouts/apollo-ios/CLI" | head -1)
          tar -xzf "$CLI_DIR/apollo-ios-cli.tar.gz" -C "$CLI_DIR"
          chmod +x "$CLI_DIR/apollo-ios-cli"
          (cd ios && "$CLI_DIR/apollo-ios-cli" generate)

      - name: Archive (Release, automatic signing via ASC key)
        run: |
          set -euo pipefail
          xcodebuild -project ios/Vinarium.xcodeproj -scheme Vinarium \
            -destination 'generic/platform=iOS' \
            -archivePath build/Vinarium.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            MARKETING_VERSION="$MARKETING" \
            CURRENT_PROJECT_VERSION="$BUILD" \
            archive

      - name: Export a signed .ipa
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath build/Vinarium.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload to App Store Connect
        run: |
          set -euo pipefail
          xcrun altool --upload-app --type ios \
            --file build/export/Vinarium.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Archive the .ipa as a run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Vinarium-ipa
          path: |
            build/export/*.ipa
          if-no-files-found: ignore
          retention-days: 14
