name: Release

on:
  push:
    tags: ['ios-v*']
  workflow_dispatch:
    inputs:
      marketing_version:
        description: 'Marketing version (CFBundleShortVersionString), e.g. 1.1'
        required: false
        default: '1.0'

permissions:
  contents: read

concurrency:
  group: release-ios
  cancel-in-progress: false

jobs:
  release:
    name: 📱 iOS build & upload
    runs-on: macos-15
    timeout-minutes: 40
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # git rev-list --count HEAD must see the full history

      - name: Select the latest final Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Materialize gitignored build files
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST }}" \
            | openssl base64 -d -A > ios/Vinarium/GoogleService-Info.plist
          cp ios/Vinarium/Shared/Secrets.swift.example ios/Vinarium/Shared/Secrets.swift

      - name: Install the App Store Connect API key
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "${{ secrets.ASC_KEY_P8 }}" \
            > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Import the distribution signing certificate
        env:
          IOS_DIST_CERT_P12: ${{ secrets.IOS_DIST_CERT_P12 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          # A dedicated (non-managed) Apple Distribution cert + private key, so signing
          # never depends on Xcode cloud-managed certificates (unusable from a fresh CI
          # machine). The .p12 is base64-encoded in the secret; import it into a throwaway
          # keychain that codesign/xcodebuild search during archive and export.
          KEYCHAIN="$RUNNER_TEMP/vinarium-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/dist-cert.p12"
          printf '%s' "$IOS_DIST_CERT_P12" | base64 -d > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$IOS_DIST_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # Prepend our keychain to the user search list so xcodebuild finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed 's/["[:space:]]//g')
          rm -f "$CERT_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Compute version numbers
        run: |
          set -euo pipefail
          BUILD=$(git rev-list --count HEAD)
          if [ "$GITHUB_REF_TYPE" = "tag" ] && [ "${GITHUB_REF_NAME#ios-v}" != "$GITHUB_REF_NAME" ]; then
            MARKETING="${GITHUB_REF_NAME#ios-v}"
          else
            MARKETING="${{ github.event.inputs.marketing_version }}"
          fi
          echo "BUILD=$BUILD" >> "$GITHUB_ENV"
          echo "MARKETING=$MARKETING" >> "$GITHUB_ENV"
          echo "Releasing Vinarium $MARKETING ($BUILD)"

      - name: Generate Apollo GraphQL code (gitignored, regenerated per build)
        run: |
          set -euo pipefail
          # Resolve SPM so the apollo-ios checkout (and its bundled CLI) exists.
          xcodebuild -resolvePackageDependencies \
            -project ios/Vinarium.xcodeproj -scheme Vinarium
          # Apollo 2.x ships the CLI as a tarball inside the checkout — extract it.
          CLI_DIR=$(find "$HOME/Library/Developer/Xcode/DerivedData" -type d \
            -path "*/SourcePackages/checkouts/apollo-ios/CLI" | head -1)
          tar -xzf "$CLI_DIR/apollo-ios-cli.tar.gz" -C "$CLI_DIR"
          chmod +x "$CLI_DIR/apollo-ios-cli"
          (cd ios && "$CLI_DIR/apollo-ios-cli" generate)

      - name: Install the App Store provisioning profile
        env:
          IOS_PROVISION_PROFILE: ${{ secrets.IOS_PROVISION_PROFILE }}
        run: |
          set -euo pipefail
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          printf '%s' "$IOS_PROVISION_PROFILE" | base64 -d \
            > "$PROFILES_DIR/555cefe2-ee65-486b-a86c-b811434d3b09.mobileprovision"

      - name: Archive (Release, automatic signing via ASC key)
        run: |
          set -euo pipefail
          xcodebuild -project ios/Vinarium.xcodeproj -scheme Vinarium \
            -destination 'generic/platform=iOS' \
            -archivePath build/Vinarium.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            MARKETING_VERSION="$MARKETING" \
            CURRENT_PROJECT_VERSION="$BUILD" \
            archive

      - name: Export a signed .ipa (manual signing)
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath build/Vinarium.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/export

      - name: Upload to App Store Connect
        run: |
          set -euo pipefail
          xcrun altool --upload-app --type ios \
            --file build/export/Vinarium.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Archive the .ipa as a run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Vinarium-ipa
          path: |
            build/export/*.ipa
          if-no-files-found: ignore
          retention-days: 14

  # After the binary is uploaded, wait for App Store Connect to finish processing it,
  # then attach it to its version, set the "What's New" from CHANGELOG, and submit for
  # review (auto-release on approval). No Xcode needed — runs on Linux. Tag pushes only;
  # a manual workflow_dispatch stops after upload so it can be submitted by hand.
  submit:
    name: 🍎 iOS submit
    needs: release
    if: startsWith(github.ref, 'refs/tags/ios-v')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write   # create/update the GitHub release for the tag
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # git rev-list --count HEAD must see the full history

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: infra

      - name: Install the App Store Connect API key
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/asc"
          printf '%s' "${{ secrets.ASC_KEY_P8 }}" > "$RUNNER_TEMP/asc/AuthKey.p8"
          echo "ASC_KEY_PATH=$RUNNER_TEMP/asc/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Compute version numbers
        run: |
          set -euo pipefail
          echo "BUILD=$(git rev-list --count HEAD)" >> "$GITHUB_ENV"
          echo "MARKETING=${GITHUB_REF_NAME#ios-v}" >> "$GITHUB_ENV"

      - name: Publish the GitHub release with the full changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Full (untruncated) bullets of the first "## " section — GitHub has no length cap.
          NOTES="$RUNNER_TEMP/gh-release-notes.md"
          awk '/^## /{n++; if (n==2) exit} n==1 && /^- /{print}' CHANGELOG.md > "$NOTES"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "iOS $MARKETING" --notes-file "$NOTES"
          else
            gh release create "$GITHUB_REF_NAME" --title "iOS $MARKETING" --notes-file "$NOTES"
          fi

      - name: Build the "What's New" notes from CHANGELOG.md
        run: |
          set -euo pipefail
          mkdir -p infra/fastlane/metadata/fr-FR
          # Bullets under the first "## " section become the release notes. App Store caps
          # "What's New" at 4000 chars, so keep whole bullets until ~3900 (drop the rest).
          awk '/^## /{n++; if (n==2) exit} n==1 && /^- /{print}' CHANGELOG.md \
            | awk 'BEGIN{max=3900; total=0} {len=length($0)+1; if (total+len>max) exit; total+=len; print}' \
            > infra/fastlane/metadata/fr-FR/release_notes.txt
          echo "---- What's New (fr-FR), $(wc -c < infra/fastlane/metadata/fr-FR/release_notes.txt) chars ----"
          cat infra/fastlane/metadata/fr-FR/release_notes.txt

      - name: Attach build and submit for review
        working-directory: infra
        run: bundle exec fastlane ios submit
