name: cave-a-vin
services:
  cave-a-vin:
    cpu_shares: 90
    command: []
    container_name: cave-a-vin
    deploy:
      resources:
        limits:
          memory: 1816M
    environment:
      - HOST=0.0.0.0
      - NITRO_SERVER_URL=http://192.168.0.165:3000
      - PORT=3000
    hostname: cave-a-vin
    image: moifort/cave-a-vin:latest
    labels:
      icon: https://cdn-icons-png.flaticon.com/512/763/763048.png
    ports:
      - target: 3000
        published: "3000"
        protocol: tcp
    pull_policy: always
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/cave-a-vin
        target: /app/data
    devices: []
    cap_add: []
    network_mode: bridge
    privileged: false
x-casaos:
  author: self
  category: self
  hostname: ""
  icon: https://cdn-icons-png.flaticon.com/512/763/763048.png
  index: /
  is_uncontrolled: false
  port_map: "3000"
  scheme: http
  store_app_id: cave_a_vin
  title:
    custom: ""
    en_us: Cave à Vin
