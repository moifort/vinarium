"""
Manually add a beverage to the catalog
"""
input AddBeverageInput {
  """
  Alcohol by volume (% vol)
  """
  alcoholContent: Percentage
  appellation: Appellation

  """
  Kind of beverage — defaults to WINE when absent
  """
  beverageType: BeverageType
  classification: Classification

  """
  Beverage color — required when the beverage is a wine
  """
  color: WineColor
  country: Country
  drinkFrom: Year
  drinkUntil: Year
  giftedBy: PersonName
  grapeVarieties: [GrapeVariety!]
  latitude: Latitude
  longitude: Longitude
  name: BeverageName!
  notes: Notes
  placeName: PlaceName
  producer: Producer
  purchaseDate: DateTime
  purchasePrice: Eur
  region: Region
  servingTemperature: Celsius

  """
  Structured subtype — must be valid for the beverage type
  """
  subtype: BeverageSubtype
  vintage: Year
}

"""
Beverage appellation (AOC / AOP / DOC ...)
"""
scalar Appellation

"""
A beverage in the user’s collection (wine, spirit, beer, sake ...)
"""
type Beverage {
  alcoholContent: Percentage
  beverageType: BeverageType!

  """
  Position in the cellar grid (null if the wine is not in cellar)
  """
  cellar: CellarBottle

  """
  Tasting / consumption details for this wine (null if never recorded)
  """
  consumption: Consumption
  country: Country
  createdAt: DateTime!

  """
  Type-specific fields — non-null only for a wine
  """
  details: BeverageDetails

  """
  Gift details for this wine (null if never gifted)
  """
  gift: Gift

  """
  Cellar entry/exit history for this wine, most recent first
  """
  history: [JournalEvent!]!
  id: BeverageId!

  """
  Whether this beverage belongs to the viewer (false for a housemate’s)
  """
  isMine: Boolean!
  name: BeverageName!
  notes: Notes
  place: Place
  producer: Producer
  purchase: Purchase

  """
  Recommendation details for this wine (null if never recommended)
  """
  recommendation: Recommendation
  region: Region
  subtype: BeverageSubtype
  updatedAt: DateTime!
  userId: UserId!
}

"""
Fields that exist only for a specific beverage type
"""
union BeverageDetails = WineDetails

"""
Beverage unique identifier (UUID v4)
"""
scalar BeverageId

"""
Which view of the beverage list to page through
"""
enum BeverageListMode {
  ALL
  FAVORITES
  GIFTED
  RECOMMENDED
}

"""
Beverage display name (non-empty)
"""
scalar BeverageName

"""
Field used to sort the beverage list
"""
enum BeverageSort {
  COLOR
  CREATED_AT
  PRICE
  REGION
  UPDATED_AT
  VINTAGE
}

"""
Lifecycle status of a beverage
"""
enum BeverageStatus {
  CONSUMED
  GIFTED
  IN_CELLAR
  RECOMMENDED
}

"""
Optional lifecycle filter applied to the beverage list
"""
enum BeverageStatusFilter {
  ALL
  CONSUMED
  IN_CELLAR
}

"""
Structured refinement of a beverage type. Validity depends on the beverageType (an IPA on a spirit is rejected); OTHER fits every type.
"""
enum BeverageSubtype {
  AMBER
  ARMAGNAC
  BLANCHE
  BLONDE
  BRUNE
  BRUT
  COGNAC
  DAIGINJO
  DEMI_SEC
  DOUX
  EAU_DE_VIE
  FORTIFIED
  GIN
  GINJO
  HONJOZO
  IPA
  JUNMAI
  LATE_HARVEST
  LIQUEUR
  NIGORI
  OTHER
  PILS
  POIRE
  PORTO
  RUM
  SPARKLING
  STOUT
  SWEET
  TEQUILA
  TRIPLE
  VIN_JAUNE
  VODKA
  WHISKY
}

"""
Kind of beverage a bottle contains
"""
enum BeverageType {
  BEER
  CIDER
  OTHER
  SAKE
  SPIRIT
  WINE
}

"""
A page of the beverage list
"""
type Beverages {
  """
  Whether more beverages are available after this page
  """
  hasMore: Boolean!
  items: [Beverage!]!

  """
  Number of beverages in this page (full count is not computed)
  """
  totalCount: Int!
}

"""
A bottle physically placed in the cellar grid
"""
type CellarBottle {
  beverageId: BeverageId!
  col: Int!
  colLabel: Int!
  createdAt: DateTime!
  row: Int!
  rowLabel: String!
  updatedAt: DateTime!
}

"""
The household member a cellar bottle belongs to
"""
type CellarBottleOwner {
  displayName: PersonName

  """
  Whether the bottle belongs to the viewer (no badge shown)
  """
  isMine: Boolean!
  userId: UserId!
}

"""
A cellar bottle joined with the corresponding wine
"""
type CellarBottleWithWine {
  beverageId: BeverageId!
  col: Int!
  colLabel: Int!
  createdAt: DateTime!
  owner: CellarBottleOwner!
  row: Int!
  rowLabel: String!
  wine: Beverage!
}

"""
A page of cellar bottles joined with their wine
"""
type CellarBottles {
  """
  Whether more bottles are available after this page
  """
  hasMore: Boolean!
  items: [CellarBottleWithWine!]!
}

"""
Configuration and current usage of the cellar grid
"""
type CellarInfo {
  capacity: Int!
  cols: Int!
  placedCount: Int!
  rows: Int!
}

"""
A free cellar position suggestion
"""
type CellarPosition {
  col: Int!
  colLabel: Int!
  row: Int!
  rowLabel: String!
}

"""
A temperature in degrees Celsius
"""
scalar Celsius

"""
A single version section of the application changelog
"""
type ChangelogEntry {
  date: DateTime
  notes: [String!]!
  version: String!
}

"""
Beverage classification (Grand Cru, Premier Cru ...)
"""
scalar Classification

"""
Tasting note / consumption record for a wine
"""
type Consumption {
  consumedDate: DateTime
  contacts: [String!]
  favorite: Boolean
  rating: Rating
  tastingNotes: String
}

"""
Details captured when consuming a bottle
"""
input ConsumptionInput {
  consumedDate: DateTime
  contacts: [String!]
  favorite: Boolean
  rating: Rating
  tastingNotes: String
}

"""
Country name
"""
scalar Country

"""
Aggregated dashboard view for the current user
"""
type Dashboard {
  bottleCount: Int!

  """
  Total cellar capacity (number of grid spots)
  """
  capacity: Int!
  favorites: [FavoriteWine!]!
  history: [JournalEvent!]!
  lastBottle: LastBottle
  lastExit: JournalEvent
  readyToDrink: [ReadyToDrinkWine!]!
  totalValue: Float!
}

"""
ISO 8601 date-time string
"""
scalar DateTime

"""
The years a wine is at its best — either bound may stand alone
"""
type DrinkWindow {
  from: Year
  until: Year
}

"""
Euro amount (non-negative)
"""
scalar Eur

type FavoriteWine {
  beverageType: BeverageType!
  color: WineColor
  estimatedPrice: Eur
  id: BeverageId!
  name: BeverageName!
  rating: Float
  tastingDate: DateTime
  vintage: Year
}

"""
How a wine relates to gifting — given away and/or received
"""
type Gift {
  given: GiftGiven
  received: GiftReceived
}

"""
The bottle was given away
"""
type GiftGiven {
  date: DateTime!
  recipientName: PersonName
}

"""
Details captured when gifting a bottle
"""
input GiftInput {
  giftedDate: DateTime!
  recipientName: PersonName
}

"""
The bottle was received as a gift (provenance)
"""
type GiftReceived {
  from: PersonName!
}

"""
A grape variety (cépage)
"""
scalar GrapeVariety

"""
A household: a group of people sharing one physical cellar
"""
type Household {
  createdAt: DateTime!
  id: HouseholdId!

  """
  Invitation codes still open, shown so any member can share them
  """
  invitations: [HouseholdInvitation!]!
  members: [HouseholdMember!]!
}

"""
Household unique identifier (UUID v4)
"""
scalar HouseholdId

"""
An open invitation code to join a household
"""
type HouseholdInvitation {
  code: String!
  expiresAt: DateTime!
}

"""
A member of a household
"""
type HouseholdMember {
  displayName: PersonName!

  """
  Whether this member is the current user
  """
  isMe: Boolean!
  joinedAt: DateTime!
  role: HouseholdRole!
  userId: UserId!
}

"""
A member’s role within their household
"""
enum HouseholdRole {
  MEMBER
  OWNER
}

"""
Number of records imported per domain
"""
type ImportResult {
  cellar: Int!
  gift: Int!
  journal: Int!
  recommendation: Int!
  tasting: Int!
  wines: Int!
}

"""
A timestamped cellar entry/exit event for a wine
"""
type JournalEvent {
  beverageId: BeverageId!
  beverageName: BeverageName!
  date: DateTime!
  position: String!
  type: JournalEventType!
  wineBeverageType: BeverageType!
  wineColor: WineColor
}

"""
Whether a journal entry records a bottle entering or leaving the cellar
"""
enum JournalEventType {
  IN
  OUT
}

"""
A page of cellar journal events
"""
type JournalEvents {
  """
  Whether more events are available after this page
  """
  hasMore: Boolean!
  items: [JournalEvent!]!
}

type LastBottle {
  date: DateTime!
  position: String!
  wine: LastBottleWine!
}

type LastBottleWine {
  beverageType: BeverageType!
  color: WineColor
  id: BeverageId!
  name: BeverageName!
  vintage: Year
}

"""
Latitude (-90..90)
"""
scalar Latitude

"""
Longitude (-180..180)
"""
scalar Longitude

type Mutation {
  """
  Add a new beverage to the catalog
  """
  addBeverage(input: AddBeverageInput!): Beverage!

  """
  Record a recommendation for a wine
  """
  addRecommendation(beverageId: BeverageId!, input: RecommendationInput!): Boolean!

  """
  Remove a bottle from the cellar and record consumption (tasting note)
  """
  consumeBottle(beverageId: BeverageId!, input: ConsumptionInput!): Boolean!

  """
  Generate an invitation code for the current user’s household, creating the household on first use
  """
  createHouseholdInvitation(displayName: PersonName!): HouseholdInvitation!

  """
  Delete a beverage and all related data (cellar, tasting, gift, recommendation, journal)
  """
  deleteBeverage(id: BeverageId!): Boolean!

  """
  Remove a bottle from the cellar and record it as a gift
  """
  giftBottle(beverageId: BeverageId!, input: GiftInput!): Boolean!

  """
  Replace all the current user records with the contents of a JSON envelope
  """
  importData(payload: String!): ImportResult!

  """
  Join a household with an invitation code
  """
  joinHousehold(code: String!, displayName: PersonName!): Household!

  """
  Leave the current household
  """
  leaveHousehold: Boolean!

  """
  Toggle the favorite (heart) flag on a wine, preserving any existing tasting note
  """
  markFavorite(beverageId: BeverageId!, favorite: Boolean = true): Boolean!

  """
  Move a bottle to a different position in the cellar
  """
  moveBottle(beverageId: BeverageId!, col: Int!, row: Int!): CellarBottle!

  """
  Place a wine in the cellar grid
  """
  placeBottle(beverageId: BeverageId!, col: Int!, row: Int!): CellarBottle!

  """
  Record a tasting note (rating, notes, favorite flag) for a wine
  """
  recordTasting(beverageId: BeverageId!, input: TastingInput!): Boolean!

  """
  Remove a bottle from the cellar without recording why
  """
  removeBottle(beverageId: BeverageId!): Boolean!

  """
  Remove a member from the household (owner only)
  """
  removeHouseholdMember(userId: UserId!): Household!

  """
  Revoke an open invitation code
  """
  revokeHouseholdInvitation(code: String!): Boolean!

  """
  Analyze a beverage label image (base64-encoded JPEG) and return structured fields. The result is cached server-side by SHA-256, so the same label scanned twice avoids re-calling Claude / Gemini.
  """
  scanBeverage(
    """
    JPEG image, base64-encoded (no data URL prefix)
    """
    imageBase64: String!
  ): ScanResult!

  """
  Update an existing beverage
  """
  updateBeverage(id: BeverageId!, input: UpdateBeverageInput!): Beverage!
}

"""
Free-form tasting notes
"""
scalar Notes

"""
A percentage (0..100)
"""
scalar Percentage

"""
Person name (1-200 chars)
"""
scalar PersonName

"""
Where the bottle was bought (coordinates and/or a place name)
"""
type Place {
  latitude: Latitude
  longitude: Longitude
  name: PlaceName
}

"""
Place name (1-200 chars)
"""
scalar PlaceName

"""
Beverage producer / château / domaine / distillery / brewery
"""
scalar Producer

"""
What the bottle cost and when it was acquired
"""
type Purchase {
  date: DateTime
  price: Eur
}

type Query {
  """
  Get a single beverage by ID
  """
  beverage(id: BeverageId!): Beverage

  """
  A page of the current user’s beverage list, filtered and sorted per view
  """
  beverages(
    after: BeverageId
    beverageType: BeverageType
    color: WineColor
    limit: Int = 40
    mode: BeverageListMode = ALL
    order: SortOrder = DESC
    sort: BeverageSort = UPDATED_AT
    status: BeverageStatusFilter = ALL
    subtype: BeverageSubtype
  ): Beverages!

  """
  A page of bottles currently in the cellar, in grid order, with the joined wine
  """
  cellarBottles(after: BeverageId, limit: Int = 15): CellarBottles!

  """
  Cellar grid dimensions and current placement count
  """
  cellarInfo: CellarInfo!

  """
  Application changelog, most recent versions first
  """
  changelog: [ChangelogEntry!]!

  """
  Aggregated dashboard view for the current user
  """
  dashboard: Dashboard!

  """
  JSON-encoded export of every record belonging to the current user
  """
  exportData: String!

  """
  A page of cellar entry/exit events for the current user, most recent first
  """
  journalEvents(limit: Int = 15, offset: Int = 0): JournalEvents!

  """
  The current user’s household, or null if they belong to none
  """
  myHousehold: Household

  """
  Search the whole collection by name, producer, subtype, region, vintage or person, ranked by relevance. An empty query with facet filters browses by filters alone; an empty query with no filter returns nothing.
  """
  searchBeverages(
    """
    Combinable facet filters
    """
    filters: SearchFiltersInput

    """
    Max hits returned
    """
    limit: Int = 50

    """
    Free text — case- and accent-insensitive
    """
    query: String
  ): SearchResults!

  """
  Suggest the next free cellar position (null if cellar is full)
  """
  suggestCellarPosition: CellarPosition
}

"""
Rating (1-5)
"""
scalar Rating

type ReadyToDrinkWine {
  beverageType: BeverageType!
  color: WineColor
  drinkUntil: Year
  id: BeverageId!
  name: BeverageName!
  position: String!
  urgent: Boolean!
}

"""
Record of a wine that was recommended by someone
"""
type Recommendation {
  comment: String
  recommenderName: PersonName
}

"""
Details captured when recording a recommendation for a wine
"""
input RecommendationInput {
  comment: String
  recommenderName: PersonName
}

"""
Beverage region (e.g. Bordeaux, Bourgogne)
"""
scalar Region

"""
Structured beverage info extracted from a label image (Gemini).
"""
type ScanResult {
  alcoholContent: Float
  appellation: String
  beverageType: BeverageType!
  classification: String
  color: WineColor
  country: String
  domain: String
  drinkFrom: Int
  drinkUntil: Int
  estimatedPrice: Float
  grapeVarieties: [String!]
  name: String!
  region: String
  subtype: BeverageSubtype
  vintage: Int
}

"""
Facet filters combinable with the text query. Absent facets are not filtered on.
"""
input SearchFiltersInput {
  """
  Keep only these beverage types
  """
  beverageTypes: [BeverageType!]

  """
  Keep only these wine colors
  """
  colors: [WineColor!]

  """
  Keep only wines flagged as favorite
  """
  favorite: Boolean

  """
  Keep only wines received or given as a gift
  """
  gifted: Boolean

  """
  Keep only wines in the cellar or already consumed
  """
  status: BeverageStatusFilter
}

"""
A wine that matched the search, with the fields that matched it
"""
type SearchHit {
  """
  Which fields matched — empty when only facet filters applied
  """
  matchedFields: [SearchMatchedField!]!

  """
  The matched wine
  """
  wine: Beverage!
}

"""
Which wine field a search query matched — the client groups results by it
"""
enum SearchMatchedField {
  APPELLATION
  GIFTED_BY
  GIFT_RECIPIENT
  NAME
  PRODUCER
  RECOMMENDER
  REGION
  SUBTYPE
  TASTING_CONTACT
  VINTAGE
}

"""
Search results ranked by relevance
"""
type SearchResults {
  """
  Matched wines, best relevance first (capped at the requested limit)
  """
  hits: [SearchHit!]!

  """
  Total number of matches before the limit was applied
  """
  totalCount: Int!
}

"""
Sort direction
"""
enum SortOrder {
  ASC
  DESC
}

"""
Tasting fields captured when recording a tasting note
"""
input TastingInput {
  consumedDate: DateTime
  contacts: [String!]
  favorite: Boolean
  rating: Rating
  tastingNotes: String
}

"""
Update an existing beverage. Absent fields keep their current value.
"""
input UpdateBeverageInput {
  """
  Alcohol by volume (% vol)
  """
  alcoholContent: Percentage
  appellation: Appellation
  beverageType: BeverageType
  classification: Classification
  color: WineColor
  country: Country
  drinkFrom: Year
  drinkUntil: Year
  giftedBy: PersonName
  grapeVarieties: [GrapeVariety!]
  latitude: Latitude
  longitude: Longitude
  name: BeverageName
  notes: Notes
  placeName: PlaceName
  producer: Producer
  purchaseDate: DateTime
  purchasePrice: Eur
  region: Region
  servingTemperature: Celsius
  subtype: BeverageSubtype
  vintage: Year
}

"""
Firebase Auth user identifier
"""
scalar UserId

"""
Beverage color category
"""
enum WineColor {
  RED
  ROSE
  WHITE
}

"""
Fields specific to a wine (absent on every other beverage type)
"""
type WineDetails {
  appellation: Appellation
  classification: Classification
  color: WineColor
  drinkWindow: DrinkWindow
  grapeVarieties: [GrapeVariety!]
  servingTemperature: Celsius
  vintage: Year
}

"""
Calendar year (>= 1800)
"""
scalar Year
