"""
Manually add a beverage to the catalog
"""
input AddWineInput {
  """
  Alcohol by volume (% vol)
  """
  alcoholContent: Float
  appellation: Appellation

  """
  Kind of beverage — defaults to WINE when absent
  """
  beverageType: BeverageType
  classification: Classification

  """
  Wine color — required when the beverage is a wine
  """
  color: WineColor
  country: Country
  domain: WineDomain
  drinkFrom: Year
  drinkUntil: Year
  giftedBy: PersonName
  grapeVarieties: [String!]
  latitude: Latitude
  longitude: Longitude
  name: WineName!
  notes: String
  placeName: PlaceName

  """
  ISO date string
  """
  purchaseDate: String
  purchasePrice: Eur
  region: Region
  servingTemperature: Float
  style: BeverageStyle
  vintage: Year
}

"""
Wine appellation (AOC / AOP / DOC ...)
"""
scalar Appellation

"""
Beverage style for non-wine drinks (IPA, Single Malt, Junmai ...)
"""
scalar BeverageStyle

"""
Kind of beverage a bottle contains
"""
enum BeverageType {
  BEER
  CIDER
  OTHER
  SAKE
  SPIRIT
  WINE
}

"""
A bottle physically placed in the cellar grid
"""
type CellarBottle {
  col: Int!
  colLabel: Int!
  createdAt: DateTime!
  row: Int!
  rowLabel: String!
  updatedAt: DateTime!
  wineId: WineId!
}

"""
A cellar bottle joined with the corresponding wine
"""
type CellarBottleWithWine {
  col: Int!
  colLabel: Int!
  createdAt: DateTime!
  row: Int!
  rowLabel: String!
  wine: Wine!
  wineId: WineId!
}

"""
Configuration and current usage of the cellar grid
"""
type CellarInfo {
  capacity: Int!
  cols: Int!
  placedCount: Int!
  rows: Int!
}

"""
A free cellar position suggestion
"""
type CellarPosition {
  col: Int!
  colLabel: Int!
  row: Int!
  rowLabel: String!
}

"""
A single version section of the application changelog
"""
type ChangelogEntry {
  date: DateTime
  notes: [String!]!
  version: String!
}

"""
Wine classification (Grand Cru, Premier Cru ...)
"""
scalar Classification

"""
Tasting note / consumption record for a wine
"""
type Consumption {
  consumedDate: DateTime
  contacts: [String!]
  favorite: Boolean
  rating: Rating
  tastingNotes: String
}

"""
Details captured when consuming a bottle
"""
input ConsumptionInput {
  consumedDate: DateTime
  contacts: [String!]
  favorite: Boolean
  rating: Rating
  tastingNotes: String
}

"""
Country name
"""
scalar Country

"""
Aggregated dashboard view for the current user
"""
type Dashboard {
  bottleCount: Int!
  favorites: [FavoriteWine!]!
  history: [JournalEvent!]!
  lastBottle: LastBottle
  lastExit: JournalEvent
  readyToDrink: [ReadyToDrinkWine!]!
  totalValue: Float!
}

"""
ISO 8601 date-time string
"""
scalar DateTime

"""
Euro amount (non-negative)
"""
scalar Eur

type FavoriteWine {
  beverageType: BeverageType!
  color: WineColor
  estimatedPrice: Eur
  id: WineId!
  name: WineName!
  rating: Float
  tastingDate: DateTime
  vintage: Year
}

"""
Record of a wine that was gifted away
"""
type Gift {
  giftedDate: DateTime!
  recipientName: PersonName
}

"""
Details captured when gifting a bottle
"""
input GiftInput {
  giftedDate: DateTime!
  recipientName: PersonName
}

"""
Number of records imported per domain
"""
type ImportResult {
  cellar: Int!
  gift: Int!
  journal: Int!
  recommendation: Int!
  tasting: Int!
  wines: Int!
}

"""
A timestamped cellar entry/exit event for a wine
"""
type JournalEvent {
  date: DateTime!
  position: String!
  type: JournalEventType!
  wineBeverageType: BeverageType!
  wineColor: WineColor
  wineId: WineId!
  wineName: WineName!
}

"""
Whether a journal entry records a bottle entering or leaving the cellar
"""
enum JournalEventType {
  IN
  OUT
}

"""
A page of cellar journal events
"""
type JournalEvents {
  """
  Whether more events are available after this page
  """
  hasMore: Boolean!
  items: [JournalEvent!]!
}

type LastBottle {
  date: DateTime!
  position: String!
  wine: LastBottleWine!
}

type LastBottleWine {
  beverageType: BeverageType!
  color: WineColor
  id: WineId!
  name: WineName!
  vintage: Year
}

"""
Latitude (-90..90)
"""
scalar Latitude

"""
Longitude (-180..180)
"""
scalar Longitude

type Mutation {
  """
  Record a recommendation for a wine
  """
  addRecommendation(input: RecommendationInput!, wineId: WineId!): Boolean!

  """
  Add a new beverage to the catalog
  """
  addWine(input: AddWineInput!): Wine!

  """
  Remove a bottle from the cellar and record consumption (tasting note)
  """
  consumeBottle(input: ConsumptionInput!, wineId: WineId!): Boolean!

  """
  Delete a wine and all related data (cellar, tasting, gift, recommendation, journal)
  """
  deleteWine(id: WineId!): Boolean!

  """
  Remove a bottle from the cellar and record it as a gift
  """
  giftBottle(input: GiftInput!, wineId: WineId!): Boolean!

  """
  Replace all the current user records with the contents of a JSON envelope
  """
  importData(payload: String!): ImportResult!

  """
  Toggle the favorite (heart) flag on a wine, preserving any existing tasting note
  """
  markFavorite(favorite: Boolean = true, wineId: WineId!): Boolean!

  """
  Move a bottle to a different position in the cellar
  """
  moveBottle(col: Int!, row: Int!, wineId: WineId!): CellarBottle!

  """
  Place a wine in the cellar grid
  """
  placeBottle(col: Int!, row: Int!, wineId: WineId!): CellarBottle!

  """
  Record a tasting note (rating, notes, favorite flag) for a wine
  """
  recordTasting(input: TastingInput!, wineId: WineId!): Boolean!

  """
  Remove a bottle from the cellar without recording why
  """
  removeBottle(wineId: WineId!): Boolean!

  """
  Analyze a wine label image (base64-encoded JPEG) and return structured fields. The result is cached server-side by SHA-256, so the same label scanned twice avoids re-calling Claude / Gemini.
  """
  scanWine(
    """
    JPEG image, base64-encoded (no data URL prefix)
    """
    imageBase64: String!
  ): ScanResult!

  """
  Update an existing wine
  """
  updateWine(id: WineId!, input: UpdateWineInput!): Wine!
}

"""
Person name (1-200 chars)
"""
scalar PersonName

"""
Place name (1-200 chars)
"""
scalar PlaceName

type Query {
  """
  All bottles currently in the cellar, with the joined wine
  """
  cellarBottles: [CellarBottleWithWine!]!

  """
  Cellar grid dimensions and current placement count
  """
  cellarInfo: CellarInfo!

  """
  Application changelog, most recent versions first
  """
  changelog: [ChangelogEntry!]!

  """
  Aggregated dashboard view for the current user
  """
  dashboard: Dashboard!

  """
  JSON-encoded export of every record belonging to the current user
  """
  exportData: String!

  """
  A page of cellar entry/exit events for the current user, most recent first
  """
  journalEvents(limit: Int = 15, offset: Int = 0): JournalEvents!

  """
  Suggest the next free cellar position (null if cellar is full)
  """
  suggestCellarPosition: CellarPosition

  """
  Get a single wine by ID
  """
  wine(id: WineId!): Wine

  """
  A page of the current user’s wine list, filtered and sorted per view
  """
  wines(
    after: WineId
    color: WineColor
    limit: Int = 40
    mode: WineListMode = ALL
    order: SortOrder = DESC
    sort: WineSort = UPDATED_AT
    status: WineStatusFilter = ALL
  ): Wines!
}

"""
Rating (1-5)
"""
scalar Rating

type ReadyToDrinkWine {
  beverageType: BeverageType!
  color: WineColor
  drinkUntil: Year
  id: WineId!
  name: WineName!
  position: String!
  urgent: Boolean!
}

"""
Record of a wine that was recommended by someone
"""
type Recommendation {
  comment: String
  recommenderName: PersonName
}

"""
Details captured when recording a recommendation for a wine
"""
input RecommendationInput {
  comment: String
  recommenderName: PersonName
}

"""
Wine region (e.g. Bordeaux, Bourgogne)
"""
scalar Region

"""
Structured beverage info extracted from a label image (Gemini).
"""
type ScanResult {
  alcoholContent: Float
  appellation: String
  beverageType: BeverageType!
  classification: String
  color: WineColor
  country: String
  domain: String
  drinkFrom: Int
  drinkUntil: Int
  estimatedPrice: Float
  grapeVarieties: [String!]
  name: String!
  region: String
  style: String
  vintage: Int
}

"""
Sort direction
"""
enum SortOrder {
  ASC
  DESC
}

"""
Tasting fields captured when recording a tasting note
"""
input TastingInput {
  consumedDate: DateTime
  contacts: [String!]
  favorite: Boolean
  rating: Rating
  tastingNotes: String
}

"""
Update an existing wine. Absent fields keep their current value.
"""
input UpdateWineInput {
  """
  Alcohol by volume (% vol)
  """
  alcoholContent: Float
  appellation: Appellation
  beverageType: BeverageType
  classification: Classification
  color: WineColor
  country: Country
  domain: WineDomain
  drinkFrom: Year
  drinkUntil: Year
  giftedBy: PersonName
  grapeVarieties: [String!]
  latitude: Latitude
  longitude: Longitude
  name: WineName
  notes: String
  placeName: PlaceName
  purchaseDate: String
  purchasePrice: Eur
  region: Region
  servingTemperature: Float
  style: BeverageStyle
  vintage: Year
}

"""
Firebase Auth user identifier
"""
scalar UserId

"""
A beverage in the user’s collection (wine, spirit, beer, sake ...)
"""
type Wine {
  alcoholContent: Float
  appellation: Appellation
  beverageType: BeverageType!

  """
  Position in the cellar grid (null if the wine is not in cellar)
  """
  cellar: CellarBottle
  classification: Classification
  color: WineColor

  """
  Tasting / consumption details for this wine (null if never recorded)
  """
  consumption: Consumption
  country: Country
  createdAt: DateTime!
  domain: WineDomain
  drinkFrom: Year
  drinkUntil: Year

  """
  Gift details for this wine (null if never gifted)
  """
  gift: Gift
  giftedBy: PersonName
  grapeVarieties: [String!]

  """
  Cellar entry/exit history for this wine, most recent first
  """
  history: [JournalEvent!]!
  id: WineId!
  latitude: Latitude
  longitude: Longitude
  name: WineName!
  notes: String
  placeName: PlaceName
  purchaseDate: String
  purchasePrice: Eur

  """
  Recommendation details for this wine (null if never recommended)
  """
  recommendation: Recommendation
  region: Region
  servingTemperature: Float
  style: BeverageStyle
  updatedAt: DateTime!
  userId: UserId!
  vintage: Year
}

"""
Wine color category
"""
enum WineColor {
  RED
  ROSE
  SPARKLING
  SWEET
  WHITE
}

"""
Wine producer / château / domain
"""
scalar WineDomain

"""
Wine unique identifier (UUID v4)
"""
scalar WineId

"""
Which view of the wine list to page through
"""
enum WineListMode {
  ALL
  FAVORITES
  GIFTED
  RECOMMENDED
}

"""
Wine display name (non-empty)
"""
scalar WineName

"""
Field used to sort the wine list
"""
enum WineSort {
  COLOR
  CREATED_AT
  PRICE
  REGION
  UPDATED_AT
  VINTAGE
}

"""
Lifecycle status of a wine
"""
enum WineStatus {
  CONSUMED
  GIFTED
  IN_CELLAR
  RECOMMENDED
}

"""
Optional lifecycle filter applied to the wine list
"""
enum WineStatusFilter {
  ALL
  CONSUMED
  IN_CELLAR
}

"""
A page of the wine list
"""
type Wines {
  """
  Whether more wines are available after this page
  """
  hasMore: Boolean!
  items: [Wine!]!

  """
  Number of wines in this page (full count is not computed)
  """
  totalCount: Int!
}

"""
Calendar year (>= 1800)
"""
scalar Year
