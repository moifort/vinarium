<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Smart App Banner: injected by the script below only once APP_STORE_ID is set. -->
    <title>Rejoindre un foyer — Vinarium</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #faf7f5;
        --card: #ffffff;
        --text: #1c1917;
        --muted: #78716c;
        --accent: #7b1e3b;
        --border: #e7e2df;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #17110f;
          --card: #241b18;
          --text: #f5f0ed;
          --muted: #a8a29e;
          --accent: #d98c9f;
          --border: #3a2f2a;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .card {
        width: 100%;
        max-width: 380px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 32px 28px;
        text-align: center;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
      }
      h1 { font-size: 1.4rem; margin: 0 0 8px; }
      p { color: var(--muted); line-height: 1.5; margin: 0 0 24px; }
      .code {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: 0.35em;
        padding: 16px 12px 16px 20px;
        border: 1px dashed var(--border);
        border-radius: 14px;
        margin-bottom: 24px;
      }
      .code[hidden] { display: none; }
      a.button {
        display: inline-block;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        padding: 14px 24px;
        border-radius: 12px;
      }
      a.secondary {
        display: inline-block;
        margin-top: 16px;
        color: var(--muted);
        font-size: 0.9rem;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Rejoindre un foyer sur Vinarium</h1>
      <p>
        Ouvrez l'application pour rejoindre la cave partagée. Si le bouton
        n'ouvre pas l'app, installez-la puis saisissez ce code :
      </p>
      <div class="code" id="code" hidden></div>
      <a class="button" id="open" href="vinarium://rejoindre/" hidden>Ouvrir dans l'app</a>
      <br />
      <a class="secondary" id="download" href="https://apps.apple.com/app/vinarium/" hidden
        >Télécharger sur l'App Store</a
      >
    </main>
    <script>
      // App Store id for Vinarium (com.polyforms.vinarium.app). Drives the download
      // link and the Smart App Banner ("Open in the app"). Leave empty only if the
      // app is ever unpublished, so the page never ships a link that 404s.
      var APP_STORE_ID = '6789688303'

      // The invitation code is the last path segment: /rejoindre/<CODE>.
      var parts = window.location.pathname.split('/').filter(Boolean)
      var code = parts.length > 1 ? decodeURIComponent(parts[1]).toUpperCase() : ''
      var el = document.getElementById('code')
      if (code && el) {
        el.textContent = code
        el.hidden = false
      }

      // Primary CTA: reopen the installed app via the custom scheme. Universal
      // Links won't re-trigger from this page (same domain), so the scheme is the
      // only reliable way back into the app once this fallback page is shown.
      var openBtn = document.getElementById('open')
      if (code && openBtn) {
        openBtn.href = `vinarium://rejoindre/${encodeURIComponent(code)}`
        openBtn.hidden = false
      }

      var dl = document.getElementById('download')
      var banner = document.createElement('meta')
      if (APP_STORE_ID && dl) {
        dl.href = `https://apps.apple.com/app/vinarium/id${APP_STORE_ID}`
        dl.hidden = false
        // app-argument hands the invitation URL to the app when the user taps
        // "Open" on the Smart App Banner, so the join sheet gets the code.
        banner.name = 'apple-itunes-app'
        banner.content = `app-id=${APP_STORE_ID}, app-argument=${window.location.href}`
        document.head.appendChild(banner)
      }
    </script>
  </body>
</html>
