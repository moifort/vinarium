<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-itunes-app" content="app-id=0000000000" />
    <title>Rejoindre un foyer — Vinarium</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #faf7f5;
        --card: #ffffff;
        --text: #1c1917;
        --muted: #78716c;
        --accent: #7b1e3b;
        --border: #e7e2df;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #17110f;
          --card: #241b18;
          --text: #f5f0ed;
          --muted: #a8a29e;
          --accent: #d98c9f;
          --border: #3a2f2a;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .card {
        width: 100%;
        max-width: 380px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 32px 28px;
        text-align: center;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
      }
      h1 { font-size: 1.4rem; margin: 0 0 8px; }
      p { color: var(--muted); line-height: 1.5; margin: 0 0 24px; }
      .code {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: 0.35em;
        padding: 16px 12px 16px 20px;
        border: 1px dashed var(--border);
        border-radius: 14px;
        margin-bottom: 24px;
      }
      .code[hidden] { display: none; }
      a.button {
        display: inline-block;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        padding: 14px 24px;
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Rejoindre un foyer sur Vinarium</h1>
      <p>
        Ouvrez ce lien depuis votre iPhone pour rejoindre automatiquement la cave
        partagée. Sinon, saisissez ce code dans l'app :
      </p>
      <div class="code" id="code" hidden></div>
      <a class="button" href="https://apps.apple.com/app/vinarium/id0000000000">
        Télécharger Vinarium
      </a>
    </main>
    <script>
      // The invitation code is the last path segment: /rejoindre/<CODE>.
      var parts = window.location.pathname.split('/').filter(Boolean)
      var code = parts.length > 1 ? decodeURIComponent(parts[1]).toUpperCase() : ''
      if (code) {
        var el = document.getElementById('code')
        el.textContent = code
        el.hidden = false
      }
    </script>
  </body>
</html>
